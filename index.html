<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AshStocks</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary">
        <div class="brand-block">
          <div class="brand-mark">AS</div>
          <div>
            <h1>AshStocks</h1>
            <p id="connectionLabel">Connecting</p>
          </div>
        </div>

        <nav class="nav-list" aria-label="Views">
          <button class="nav-item active" type="button" data-view="scanner">
            <i data-lucide="radar" aria-hidden="true"></i>
            <span>Scanner</span>
          </button>
          <button class="nav-item" type="button" data-view="parameters">
            <i data-lucide="sliders-horizontal" aria-hidden="true"></i>
            <span>Parameters</span>
          </button>
          <button class="nav-item" type="button" data-view="data">
            <i data-lucide="database" aria-hidden="true"></i>
            <span>Data</span>
          </button>
          <a class="nav-item" href="/q1">
            <i data-lucide="upload-cloud" aria-hidden="true"></i>
            <span>Q1 Runner</span>
          </a>
        </nav>

        <div class="sidebar-panel">
          <span class="eyebrow">Upstox</span>
          <strong id="upstoxLabel">Checking</strong>
          <p id="runtimeLabel">Render backend</p>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <span class="eyebrow">India Selection Engine</span>
            <h2 id="pageTitle">Scanner</h2>
          </div>
          <div class="toolbar">
            <button class="secondary-button" id="defaultPoolBtn" type="button">
              <i data-lucide="list-restart" aria-hidden="true"></i>
              <span>Curated</span>
            </button>
            <button class="secondary-button" id="masterPoolBtn" type="button">
              <i data-lucide="database-zap" aria-hidden="true"></i>
              <span>NSE Master</span>
            </button>
            <button class="secondary-button" id="runScanBtn" type="button">
              <i data-lucide="play" aria-hidden="true"></i>
              <span>Run</span>
            </button>
            <button class="primary-button" id="runUpstoxBtn" type="button">
              <i data-lucide="satellite-dish" aria-hidden="true"></i>
              <span>Upstox</span>
            </button>
            <button class="icon-button" id="exportBtn" type="button" title="Export CSV" aria-label="Export CSV">
              <i data-lucide="download" aria-hidden="true"></i>
            </button>
            <button class="icon-button" id="themeBtn" type="button" title="Toggle theme" aria-label="Toggle theme">
              <i data-lucide="moon" aria-hidden="true"></i>
            </button>
          </div>
        </header>

        <section class="alert-line" id="messageLine" role="status" aria-live="polite">Loading scanner</section>

        <section class="view active" id="scannerView" data-view-panel="scanner">
          <div class="summary-grid" id="summaryGrid"></div>

          <div class="workband controls-band">
            <label class="field compact-field">
              <span>Search</span>
              <input id="searchInput" type="search" autocomplete="off" placeholder="RELIANCE, bank, IT" />
            </label>
            <label class="field compact-field">
              <span>Decision</span>
              <select id="decisionFilter">
                <option value="ALL">All</option>
                <option value="SELECT">SELECT</option>
                <option value="WATCH">WATCH</option>
                <option value="REJECT">REJECT</option>
                <option value="BLOCKED">BLOCKED</option>
                <option value="DATA_NEEDED">DATA_NEEDED</option>
              </select>
            </label>
            <label class="field compact-field">
              <span>Sector</span>
              <select id="sectorFilter"><option value="ALL">All</option></select>
            </label>
            <label class="field compact-field">
              <span>From</span>
              <input id="fromDate" type="date" />
            </label>
            <label class="field compact-field">
              <span>To</span>
              <input id="toDate" type="date" />
            </label>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>Sector</th>
                  <th>Decision</th>
                  <th>Score</th>
                  <th>Mom / Qual</th>
                  <th>6M / 12M</th>
                  <th>Target</th>
                  <th>Paper</th>
                  <th>Liquidity</th>
                  <th>Reason</th>
                </tr>
              </thead>
              <tbody id="resultBody"></tbody>
            </table>
          </div>
        </section>

        <section class="view" id="parametersView" data-view-panel="parameters">
          <div class="section-head">
            <h3>Parameter Bank</h3>
            <span id="parameterCount">0 active</span>
          </div>
          <div class="parameter-grid" id="parameterGrid"></div>
        </section>

        <section class="view" id="dataView" data-view-panel="data">
          <div class="section-head">
            <h3>Stock Pool</h3>
            <div class="inline-actions">
              <button class="secondary-button" id="templateBtn" type="button">
                <i data-lucide="file-spreadsheet" aria-hidden="true"></i>
                <span>Template</span>
              </button>
              <button class="secondary-button" id="applyCsvBtn" type="button">
                <i data-lucide="check" aria-hidden="true"></i>
                <span>Apply</span>
              </button>
            </div>
          </div>
          <div class="data-grid">
            <label class="field file-field">
              <span>CSV Upload</span>
              <input id="csvFile" type="file" accept=".csv,text/csv" />
            </label>
            <label class="field text-field">
              <span>CSV Paste</span>
              <textarea id="csvInput" spellcheck="false"></textarea>
            </label>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
