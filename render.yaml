services:
  - type: web
    name: ash-stock
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: REQUIRE_DB
        value: "true"
      - key: REQUIRE_AUTH
        value: "true"
      - key: APP_PASSWORD
        sync: false
      - key: APP_SESSION_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: ashstock
      - key: UPSTOX_API_KEY
        sync: false
      - key: UPSTOX_ACCESS_TOKEN
        sync: false
