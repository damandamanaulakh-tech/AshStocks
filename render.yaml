services:
  - type: web
    name: ashstocks-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn ashstocks.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PAPER_ONLY
        value: "true"
      - key: BROKER_WRITE_ENABLED
        value: "false"
