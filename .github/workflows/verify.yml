name: Verify Ash Stock

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: npm install

      - name: Syntax check
        run: npm run check

      - name: Python compatibility check
        run: python -m py_compile app.py main.py ashstocks/api.py

      - name: Python API smoke test
        run: python scripts/check_python_api.py

      - name: Smoke test
        run: npm run smoke

      - name: Live Render verification
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          LIVE_RENDER_URL: https://ashstocks-api.onrender.com
          LIVE_RETRY_COUNT: "30"
          LIVE_RETRY_DELAY_MS: "20000"
          LIVE_REQUEST_TIMEOUT_MS: "20000"
        run: npm run verify:live
